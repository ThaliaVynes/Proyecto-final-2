<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="scripts/main.js" type="module"> </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#ffffff] p-6 md:p-10">
     <!-- Header: contiene el logo y el buscador principal de la página -->
    <header
      class="flex flex-col mt-6 m-6 gap-8 md:flex-row md:justify-between md:items-center"
    >
      <!-- logo de la pagina -->
      <img class="w-30 md:w-33" src="./public/imagenes/icon/logo-f7862584.svg" alt="Logo"/>
     <!-- Buscador pequeño: al hacer click abre el panel grande de filtros -->
      <div id="buscadorPequeno" class="mt-5 flex items-center bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer">
         <!-- Input para buscar por ubicación -->
        <input id="inputUbicacion" type="text" readonly placeholder="Add location" class="w-32 h-12 px-3 outline-none border-r border-[#b2aea8]"/>
        <!-- OUTLINE-none quita el borde automático del input al hacer click -->
    <!-- Input visual de huéspedes. Es readonly porque los huéspedes se manejan con botones + y - -->
     <!-- READONLY evita que el usuario escriba directamente en este input -->
        <input id="inputHuespedes" type="text" placeholder="Add guests" readonly class="w-32 h-12 px-3 outline-none border-r border-[#b2aea8]"/>
        <div class="w-12 h-12 flex items-center justify-center">
       <!-- Icono de búsqueda -->
          <img src="./public/imagenes/icon/search.svg" alt="logo2" class="w-4" />
        </div>
      </div>

        <!-- Buscador grande: panel de filtros para editar ubicación y huéspedes -->
   <section id="buscadorGrande" class="hidden fixed top-0 left-0 w-full min-h-[520px]  md:min-h-[260px]  bg-white z-50 p-6 md:px-20 shadow-md">
   <!-- Encabezado del panel de búsqueda -->
   <div class="flex justify-between items-center mb-5  md:hidden">
    <p class="font-bold text-sm">Edit your search</p>
       <!-- Botón para cerrar el panel de búsqueda -->
    <button type="button" id="cerrarBuscador" class="font-bold text-xl">X</button>
    </div>

     <!-- Formulario principal de filtros -->
   <form class="flex flex-col md:flex-row bg-white rounded-2xl shadow-md overflow-hidden">
    <!-- OVERFLOW-hidden oculta el contenido que sobresale del contenedor -->

   <!-- Filtro de ubicación -->
  <div class="w-full md:w-1/3 px-5 py-3 border-b md:border-b-0 md:border-r">
    <p  class="text-xs font-bold">LOCATION</p>
    <input  id="inputUbicacionGrande" type="text" placeholder="Add location">
  </div>

  <!-- Filtro de huéspedes -->
  <div id="zonaGuests" class="w-full md:w-1/3 px-5 py-3 border-b md:border-b-0 md:border-r">
    <p class="text-xs font-bold">GUESTS</p>
    <p id="textoHuespedes">Add guests</p>
  </div>

   <!-- Botón visual de búsqueda -->
  <div class="w-full md:w-1/3 flex justify-center items-center py-3">
    <button id="botonBuscarGrande" type="button"  class="bg-[#eb5757] text-white w-40 h-12 rounded-xl flex items-center justify-center gap-2">
      <img src="./public/imagenes/icon/search.svg" alt="search"  class="w-4 brightness-0 invert">
      <span>Search</span>
    </button>
  </div>
</form>

<!-- Contenedor para futuras sugerencias de ubicación -->
<div id="resultadosUbicacion" class="mt-6 hidden"></div>

<!-- Panel de huéspedes: permite sumar o restar adultos y niños -->
<div id="panelGuests" class="hidden mt-8 md:ml-[33%] md:w-1/3">
   <!-- Control de adultos -->
    <div class="mb-8">
    <p class="font-bold">Adults</p>
    <p class="text-gray-400 text-sm">Ages 13 or above</p>

    <div class="flex items-center gap-6 mt-2">
      <button type="button" id="menosAdultos" class="border px-2 rounded">-</button>
      <span id="contadorAdultos">0</span>
      <button type="button" id="masAdultos" class="border px-2 rounded">+</button>
    </div>
  </div>
  <!-- Control de niños -->
  <div>
    <p class="font-bold">Children</p>
    <p class="text-gray-400 text-sm">Ages 2-12</p>

    <div class="flex items-center gap-6 mt-2">
      <button type="button" id="menosNinos" class="border px-2 rounded">-</button>
      <span id="contadorNinos">0</span>
      <button type="button" id="masNinos" class="border px-2 rounded">+</button>
    </div>
  </div>

</div>
</section>
    </header>
  <!-- Main: contenido principal de la página -->
    <main class="m-3">
        <!-- Título de la sección de resultados -->
      <div class="flex justify-between items-center mt-12 mb-8">
        <h1 class="font-bold text-3xl">Stays in Finland</h1>
        <p class="font-semibold text-sm text-[#a39b99]">12+ stays</p>
      </div>
      <!-- Section  las cards de hoteles con Javascript -->
      <section  id="hoteles" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
       
      </section>
    </main>
  </body>
</html>
