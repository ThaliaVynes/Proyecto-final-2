<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="scripts/main.js" type="module"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-[#ffffff] p-6 md:p-10">
    <header
      class="flex flex-col mt-6 m-6 gap-8 md:flex-row md:justify-between md:items-center"
    >
      <!-- logo de la pagina -->

      <img
        class="w-30 md:w-33"
        src="./imagenes/icon/logo-f7862584.svg"
        alt="Logo"
      />

      <!-- Filtros de la pagina -->
      <div
        id="buscadorPequeno"
        class="mt-5 flex items-center bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer"
      >
        <input
          id="inputUbicacion"
          type="text"
          placeholder="Add location"
          class="w-32 h-12 px-3 outline-none border-r border-[#b2aea8]"
        />

        <input
          id="inputHuespedes"
          type="text"
          placeholder="Add guests"
          class="w-32 h-12 px-3 outline-none border-r border-[#b2aea8]"
        />
        <div class="w-12 h-12 flex items-center justify-center">
          <img src="./imagenes/icon/search.svg " alt="logo2" class="w-4" />
        </div>
      </div>

      <!-- buscador grande -->
      <div id="buscadorGrande" class="hidden fixed top-0 left-0 w-full min-h-[520px]  md:min-h-[260px]  bg-white z-50 p-6 md:px-20 shadow-md">
  
  <div class="flex justify-between items-center mb-5">
    <p class="font-bold text-sm">Edit your search</p>
    <button id="cerrarBuscador" class="font-bold text-xl">X</button>
  </div>

  <!-- BARRA PRINCIPAL -->
<div class="flex flex-col md:flex-row bg-white rounded-2xl shadow-md overflow-hidden">

  <!-- LOCATION -->
  <div class="w-full md:w-1/3 px-5 py-3 border-b md:border-b-0 md:border-r">
    <p class="text-xs font-bold">LOCATION</p>
    <input id="inputUbicacionGrande" type="text" placeholder="Add location">
  </div>

  <!-- GUESTS -->
  <div id="zonaGuests" class="w-full md:w-1/3 px-5 py-3 border-b md:border-b-0 md:border-r">
    <p class="text-xs font-bold">GUESTS</p>
    <p id="textoHuespedes">Add guests</p>
  </div>

  <!-- SEARCH -->
  <div class="w-full md:w-1/3 flex justify-center items-center py-3">
    <button class="bg-[#eb5757] text-white w-40 h-12 rounded-xl flex items-center justify-center gap-2">
      <img src="./imagenes/icon/search.svg" alt="search" class="w-4 brightness-0 invert">
      <span>Search</span>
    </button>
  </div>

</div>
<!-- RESULTADOS DE LOCATION -->
<div id="resultadosUbicacion" class="mt-6 hidden"></div>

<!-- PANEL DE GUESTS -->
<div id="panelGuests" class="hidden mt-8 md:ml-[33%] md:w-1/3">
  <!-- Adults y Children aquí -->
    <div class="mb-8">
    <p class="font-bold">Adults</p>
    <p class="text-gray-400 text-sm">Ages 13 or above</p>

    <div class="flex items-center gap-6 mt-2">
      <button id="menosAdultos" class="border px-2 rounded">-</button>
      <span id="contadorAdultos">0</span>
      <button id="masAdultos" class="border px-2 rounded">+</button>
    </div>
  </div>

  <div>
    <p class="font-bold">Children</p>
    <p class="text-gray-400 text-sm">Ages 2-12</p>

    <div class="flex items-center gap-6 mt-2">
      <button id="menosNinos" class="border px-2 rounded">-</button>
      <span id="contadorNinos">0</span>
      <button id="masNinos" class="border px-2 rounded">+</button>
    </div>
  </div>

</div>
</div>
    </header>

    <main class="m-3">
      <!-- titulo -->
      <div class="flex justify-between items-center mt-12 mb-8">
        <h1 class="font-bold text-3xl">Stays in Finland</h1>
        <p class="font-semibold text-sm text-[#a39b99]">12+ stays</p>
      </div>
      <!-- Incio de Card de los Hoteles -->
      <section
        id="hoteles"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"
      >
        <!-- <div class="mt-6">
        <img  class="rounded-3xl" src="https://images.unsplash.com/photo-1505873242700-f289a29e1e0f?ixlib=rb-1.2.1&auto=format&fit=crop&w=2255&q=80" alt="imagen del hotel">
        <div class="mt-2">
          <div class="flex justify-between">
          <p class="text-[#a39b99] font-semibold">Entire apartament .2 beds</p>
          <div class="flex items-center gap-1">
          <img class=" w-5 fill-orange-500" src="./imagenes/icon/star.svg" alt="Estrella">
          <span class="text-[#a39b99] font-semibold">4.4</span>
          </div>
          </div>
          <p class="text-[#313130] font-semibold mt-3 ">Stylist apartament in center of the city</p>
        </div>
      </div> -->
      </section>
    </main>
  </body>
</html>
